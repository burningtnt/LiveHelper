<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LiveHelper - 系统不兼容</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ffffff;
    color: #1a1a1a;
    transition: background 0.3s ease, color 0.3s ease;
  }

  .container {
    text-align: center;
    padding: 2rem;
  }

  .main-text {
    font-size: 1.5rem;
    font-weight: 600;
    line-height: 1.6;
    margin-bottom: 1rem;
  }

  .sub-text {
    font-size: 1rem;
    font-weight: 400;
    line-height: 1.5;
    opacity: 0.65;
    letter-spacing: 0.05em;
    font-family: Consolas, "SF Mono", "Fira Code", "Fira Mono", "Roboto Mono", "Courier New", monospace;
  }

  @media (prefers-color-scheme: dark) {
    body {
      background: #121212;
      color: #e0e0e0;
    }
  }

  @media (prefers-color-scheme: light) {
    body {
      background: #ffffff;
      color: #1a1a1a;
    }
  }

  @media (max-width: 480px) {
    .main-text {
      font-size: 1.2rem;
    }
    .sub-text {
      font-size: 0.85rem;
    }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="main-text">您当前的操作系统无法运行 LiveHelper，请与开发者联系</div>
    <div class="sub-text">{ERROR_ID}</div>
  </div>
</body>
</html>
